이전에 입력하셨던 내용과 동일한데, **연금 앱 쪽 Secrets에 입력됐는지** 확인이 필요합니다. 가족 자산 앱 Secrets에만 입력하고 연금 앱 Secrets는 비어있는 경우가 많습니다.

---

**확인 방법**

Streamlit Cloud 메인 화면에서 앱 목록을 보면 두 앱이 따로 있습니다.
```
my-stock-dashboard          ← 가족 자산 앱
pension-cashflow-dashboard  ← 연금 앱  ← 이 앱의 Settings → Secrets 확인
